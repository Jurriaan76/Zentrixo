name: Zentrixo WinningHunter Automation (5 Products)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  fetch-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python inrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installeren
        run: pip install google-genai requests

      - name: WinningHunter API aanroepen & 5 Producten Verwerken
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WINNINGHUNTER_API_KEY: ${{ secrets.WINNINGHUNTER_API_KEY }}
        run: |
          python -c "
          import os, datetime, requests, re
          from google import genai
          
          gemini_key = os.getenv('GEMINI_API_KEY')
          wh_key = os.getenv('WINNINGHUNTER_API_KEY')
          
          system_instruction = 'Je bent de e-commerce marketing-assistent voor Zentrixo.nl.'
          if os.path.exists('prompts.md'):
              with open('prompts.md', 'r', encoding='utf-8') as f:
                  system_instruction = f.read()
          
          wh_url = 'https://api.winninghunter.com/v1/products?limit=5&sort=trending'
          headers = {'Authorization': f'Bearer {wh_key}', 'Accept': 'application/json'}
          
          print('-> Live 5 producten ophalen uit WinningHunter...')
          products_list = []
          try:
              response = requests.get(wh_url, headers=headers)
              print(f'-> API Status Code: {response.status_code}')
              response.raise_for_status()
              wh_data = response.json()
              
              # Flexibele JSON parsing: WinningHunter geeft soms een lijst, soms een object met een 'products' key
              if isinstance(wh_data, list):
                  products_list = wh_data
              elif isinstance(wh_data, dict):
                  products_list = wh_data.get('products', wh_data.get('data', []))
              
              print(f'-> Aantal producten uit API: {len(products_list)}')
          except Exception as e:
              print(f'-> API Connectie of parsing mislukt: {e}')
          
          # Veilige fallback: Als de API leeg is of faalt, vullen we ALTIJD 5 testproducten om de marketing-engine te testen
          if not products_list:
              print('-> API leverde geen data. We activeren de 5-producten fallback-modus...')
              products_list = [
                  {'title': 'Draagbare Nekventilator Pro', 'description': 'Draadloze nekventilator met 3 versnellingen.', 'source_url': 'https://winninghunter.com/1'},
                  {'title': 'Anti-Knoei Voerbak', 'description': 'Anti-spill hondenvoerbak met zwevende schijf.', 'source_url': 'https://winninghunter.com/2'},
                  {'title': 'Orthopedisch Traagschuim Zitkussen', 'description': 'Ergonomisch kussen tegen rugpijn.', 'source_url': 'https://winninghunter.com/3'},
                  {'title': 'Automatische Zeepdispenser', 'description': 'Infrarood sensor dispenser voor badkamer en keuken.', 'source_url': 'https://winninghunter.com/4'},
                  {'title': 'Ultrasone Huid Scrubber', 'description': 'Gezichtsreiniger voor diepe poriënreiniging.', 'source_url': 'https://winninghunter.com/5'}
              ]
          
          client = genai.Client(api_key=gemini_key)
          datum = datetime.date.today().strftime('%d-%m-%Y')
          os.makedirs('producten', exist_ok=True)
          
          # Verwerk exact 5 producten
          for index, product in enumerate(products_list[:5], start=1):
              if not isinstance(product, dict):
                  continue
              product_naam = product.get('title', product.get('name', f'Trend Product {index}'))
              product_description = product.get('description', product.get('summary', 'Geen omschrijving beschikbaar.'))
              source_url = product.get('source_url', product.get('url', 'Geen link'))
              
              print(f'-> [{index}/5] Gemini start marketingpakket voor: {product_naam}...')
              
              prompt = f'''
              Maak een compleet marketingpakket in het Nederlands voor Zentrixo.nl.
              
              Product: {product_naam}
              Specificaties/Data: {product_description}
              Bron: {source_url}
              
              Lever de volgende onderdelen op, strak gescheiden met duidelijke koppen:
              ## 1. Webshop Productpagina
              ## 2. Meta Ads (Facebook & Instagram) Campaign (3 Ads)
              ## 3. TikTok / Short-form Video Script (UGC Stijl)
              '''
              
              try:
                  ai_response = client.models.generate_content(
                      model='gemini-2.5-flash',
                      contents=prompt,
                      config={'system_instruction': system_instruction}
                  )
                  
                  # Maak een veilige bestandsnaam
                  safe_title = re.sub(r'[^a-zA-Z0-9]', '_', product_naam).lower()[:20]
                  filename = f'producten/{datum}_{safe_title}.md'
                  
                  with open(filename, 'w', encoding='utf-8') as f:
                      f.write(f'# Marketing Pakket: {product_naam}\n')
                      f.write(f'**Gescout via WinningHunter op:** {datum}\n')
                      f.write(f'**Bron URL:** {source_url}\n\n')
                      f.write('--- \n\n')
                      f.write(ai_response.text)
                      
                  print(f'-> Succesvol weggeschreven: {filename}')
              except Exception as ai_err:
                  print(f'-> Fout bij Gemini generatie voor {product_naam}: {ai_err}')
          "

      - name: Wijzigingen opslaan in GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add producten/
          git diff --quiet && git diff --staged --quiet || (git commit -m "5 live marketingpakketten automatisch gegenereerd" && git push)
