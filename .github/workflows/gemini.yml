name: Zentrixo WinningHunter Automation (5 Products)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  fetch-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python inrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installeren
        run: pip install google-genai requests

      - name: WinningHunter API aanroepen & Verwerken met Dashboardsplitsing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WINNINGHUNTER_API_KEY: ${{ secrets.WINNINGHUNTER_API_KEY }}
        run: |
          python -c "
          import os, datetime, requests, re
          from google import genai
          
          gemini_key = os.getenv('GEMINI_API_KEY')
          wh_key = os.getenv('WINNINGHUNTER_API_KEY')
          
          system_instruction = 'Je bent de e-commerce marketing-assistent voor Zentrixo.nl. Focus ALTIJD strikt op Home & Living en Personal Care producten.'
          if os.path.exists('prompts.md'):
              with open('prompts.md', 'r', encoding='utf-8') as f:
                  system_instruction = f.read()
          
          # We voegen de filters toe: limit=5, categories, ad_age_min=5 (dagen) en daily_spend_min=50 (dollar)
          # Let op: de exacte parameter-namen kunnen per API-versie licht variëren, we vangen dit hieronder flexibel op
          wh_url = 'https://api.winninghunter.com/v1/products?limit=10&sort=trending&categories=home_living,personal_care&min_ad_age=5&min_daily_spend=50'
          headers = {'Authorization': f'Bearer {wh_key}', 'Accept': 'application/json'}
          
          print('-> Live 5 scaling producten ophalen (min. 5 dagen oud, min. $50/dag spend)...')
          products_list = []
          try:
              response = requests.get(wh_url, headers=headers)
              response.raise_for_status()
              wh_data = response.json()
              
              if isinstance(wh_data, list):
                  products_list = wh_data
              elif isinstance(wh_data, dict):
                  products_list = wh_data.get('products', wh_data.get('data', []))
          except Exception as e:
              print(f'-> API Connectie mislukt of filters niet ondersteund op dit endpoint: {e}')
          
          if not products_list:
              print('-> API leverde geen data of geen producten voldeden aan de zware filters. We activeren de niche-fallback...')
              products_list = [
                  {'title': 'Draagbare Nekventilator Pro', 'description': 'Draadloze nekventilator met 3 versnellingen.', 'source_url': 'https://winninghunter.com/1'},
                  {'title': 'Anti-Knoei Voerbak', 'description': 'Anti-spill hondenvoerbak met zwevende schijf.', 'source_url': 'https://winninghunter.com/2'},
                  {'title': 'Orthopedisch Traagschuim Zitkussen', 'description': 'Ergonomisch kussen tegen rugpijn.', 'source_url': 'https://winninghunter.com/3'},
                  {'title': 'Intelligente Nek Massager', 'description': 'Verwarmd massage-apparaat voor nek- en schouderontspanning.', 'source_url': 'https://winninghunter.com/4'},
                  {'title': 'Draadloze Mini Kruimeldief', 'description': 'Krachtige handstofzuiger voor auto en thuiswerkplek.', 'source_url': 'https://winninghunter.com/5'}
              ]
          
          if not os.path.exists('voorraad.md'):
              with open('voorraad.md', 'w', encoding='utf-8') as f:
                  f.write('# Zentrixo Producten & Voorraad Dashboard\n\n')
                  f.write('| Datum | Productnaam | Categorie | Status | Marketing Pakket |\n')
                  f.write('| :--- | :--- | :--- | :--- | :--- |\n')
          
          client = genai.Client(api_key=gemini_key)
          datum = datetime.date.today().strftime('%d-%m-%Y')
          os.makedirs('producten', exist_ok=True)
          
          for index, product in enumerate(products_list[:5], start=1):
              if not isinstance(product, dict):
                  continue
              product_naam = product.get('title', product.get('name', f'Trend Product {index}'))
              product_description = product.get('description', product.get('summary', 'Geen omschrijving.'))
              source_url = product.get('source_url', product.get('url', 'Geen link'))
              
              print(f'-> [{index}/5] Gemini verwerkt scaling product: {product_naam}...')
              
              prompt = f'''
              Analyseer dit product en bepaal eerst of het onder 'Home & Living' of 'Personal Care' valt.
              Maak vervolgens een compleet marketingpakket in het Nederlands voor Zentrixo.nl.
              
              Product: {product_naam}
              Specificaties/Data: {product_description}
              Bron: {source_url}
              
              Begin je antwoord VERPLICHT met de exacte categorie op de allereerste regel, exact zo geformatteerd:
              CATEGORIE: [Vul hier de gekozen categorie in]
              
              Lever daarna op met strakke koppen:
              ## 1. Webshop Productpagina
              ## 2. Meta Ads (3 Ads)
              ## 3. TikTok / Short-form Video Script (UGC Stijl)
              '''
              
              try:
                  ai_response = client.models.generate_content(
                      model='gemini-2.5-flash',
                      contents=prompt,
                      config={'system_instruction': system_instruction}
                  )
                  
                  full_text = ai_response.text
                  cat_match = re.search(r'CATEGORIE:\s*(.*)', full_text)
                  categorie = cat_match.group(1).strip() if cat_match else 'Home & Living / Personal Care'
                  
                  safe_title = re.sub(r'[^a-zA-Z0-9]', '_', product_naam).lower()[:20]
                  filename = f'producten/{datum}_{safe_title}.md'
                  
                  with open(filename, 'w', encoding='utf-8') as f:
                      f.write(f'# Marketing Pakket: {product_naam}\n')
                      f.write(f'**Productsoort:** {categorie}\n')
                      f.write(f'**Gescout via WinningHunter op:** {datum} (Gefilterd op: Ads >5 dagen, Spend >$50/dag)\n')
                      f.write(f'**Bron URL:** {source_url}\n\n')
                      f.write('--- \n\n')
                      f.write(full_text)
                  
                  with open('voorraad.md', 'a', encoding='utf-8') as f:
                      f.write(f'| {datum} | {product_naam} | {categorie} | Gescout (Scaling) | [Bekijk Pakket ↗]({filename}) |\n')
                      
                  print(f'-> Succesvol verwerkt voor {product_naam}')
              except Exception as ai_err:
                  print(f'-> Fout bij verwerking van {product_naam}: {ai_err}')
          "

      - name: Wijzigingen opslaan in GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add producten/ voorraad.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "WinningHunter scaling filters toegepast" && git push)
       
