name: Gemini Assistent

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Controleer Python en start installatie
        run: |
          echo "=== STAP 1: Python controleren ==="
          python --version
          echo "=== STAP 2: Bibliotheken installeren ==="
          pip install google-genai requests
          echo "=== STAP 3: Installatie voltooid ==="

      - name: Voer assistent-script uit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: '1'
          REPO: ${{ github.repository }}
        run: |
          echo "=== STAP 4: Script opstarten ==="
          python assistent.py
          echo "=== STAP 5: Script volledig klaar ==="
