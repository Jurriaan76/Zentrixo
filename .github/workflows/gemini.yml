name: Gemini Assistent

on:
  issues:
    types: [opened]

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installeer bibliotheken
        run: pip install google-genai requests

      - name: Voer assistent uit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO: ${{ github.repository }}
        run: |
          python -c "
          import os, requests
          from google import genai
          
          api_key = os.getenv('GEMINI_API_KEY')
          github_token = os.getenv('GITHUB_TOKEN')
          repo = os.getenv('REPO')
          issue_number = os.getenv('ISSUE_NUMBER')
          issue_body = os.getenv('ISSUE_BODY', 'Geen tekst meegegeven.')
          
          # We sturen de tekst van jouw Issue rechtstreeks naar Gemini
          client = genai.Client(api_key=api_key)
          response = client.models.generate_content(
              model='gemini-2.5-flash', 
              contents=issue_body
          )
          gpt_tekst = response.text
          
          url = f'https://api.github.com/repos/{repo}/issues/{issue_number}/comments'
          headers = {'Authorization': f'token {github_token}', 'Accept': 'application/vnd.github.v3+json'}
          requests.post(url, headers=headers, json={'body': gpt_tekst})
          "
